name: Cloud Brain CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cloud-brain/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cloud-brain/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cloud-brain/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: cloud-brain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: cloud-brain
        run: ruff check src tests

      - name: Type check with mypy
        working-directory: cloud-brain
        run: mypy src

      - name: Run unit tests
        working-directory: cloud-brain
        run: pytest -m "not property_test" --cov=src --cov-report=xml

      - name: Run property-based tests
        working-directory: cloud-brain
        run: pytest -m property_test --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: cloud-brain/coverage.xml
          flags: cloud-brain

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        working-directory: cloud-brain/infrastructure
        run: pip install -r requirements.txt

      - name: Deploy to development
        working-directory: cloud-brain/infrastructure
        run: cdk deploy --require-approval never --context environment=development

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        working-directory: cloud-brain/infrastructure
        run: pip install -r requirements.txt

      - name: Deploy to staging
        working-directory: cloud-brain/infrastructure
        run: cdk deploy --require-approval never --context environment=staging
